<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>

<input id="username" placeholder="Enter name"><br><br>
<button onclick="login()">Login</button>

<script>
function login() {
  localStorage.setItem("user", username.value);
  window.location.href = "index.html";
}
</script>

</body>
</html>
